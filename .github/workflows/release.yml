name: Publish to npm

# Publishes box-open-elements to npm when a GitHub Release is published (or on a
# manual dispatch). Builds a fresh dist, runs the full verify gate, and publishes
# with npm provenance (attested via OIDC — no long-lived token in the tarball).
#
# One-time setup:
#   - Add an `NPM_TOKEN` repo secret: a granular npm access token with
#     publish rights for `box-open-elements`.
#   - Cut releases by bumping `version` in package.json, tagging `vX.Y.Z`, and
#     publishing a GitHub Release for that tag (the tag must match the version).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # npm (from Node) does the publish + provenance; registry-url wires up the
      # auth token. Bun handles install + the build/test gate.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Guard against a tag/version mismatch publishing the wrong version.
      - name: Check tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Verify (typecheck + coverage tests + build)
        run: bun run verify

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
