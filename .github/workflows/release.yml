name: Publish to npm

# Publishes @unofficialbox/box-open-elements to npm when a GitHub Release is
# published (or on a manual dispatch). Builds a fresh dist, runs the full verify
# gate, and publishes via npm OIDC "trusted publishing" — no long-lived token,
# with provenance generated automatically.
#
# One-time setup (no repo secret needed):
#   - On npmjs.com, configure a Trusted Publisher for the package: org
#     `unofficialbox`, this repository, workflow `release.yml`. This is what
#     authorises the tokenless OIDC publish below.
#   - Cut releases by bumping `version` in package.json, tagging `vX.Y.Z`, and
#     publishing a GitHub Release for that tag (the tag must match the version).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # npm (from Node) does the publish; Bun handles install + the build/test gate.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs a recent npm; the version bundled with
      # Node 22 predates it. This upgrade is what lets `npm publish` mint a
      # short-lived credential from the id-token — no NPM_TOKEN secret required.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Guard against a tag/version mismatch publishing the wrong version.
      - name: Check tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match release tag ($TAG)"
            exit 1
          fi

      - name: Verify (typecheck + coverage tests + build)
        run: bun run verify

      # Tokenless: authenticated via OIDC against the npm "trusted publisher"
      # configured for this package (org unofficialbox → this repo + workflow).
      # Provenance is generated automatically under trusted publishing.
      - name: Publish (OIDC trusted publishing)
        run: npm publish --access public
