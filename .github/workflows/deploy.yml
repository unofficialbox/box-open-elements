name: Deploy docs site

# Publishes the docs-site (+ the Storybook workshop at /workshop/) to GitHub
# Pages on every push to main. The build artifact is host-agnostic — the same
# docs-site/dist can be served from Vercel by pointing it at `bun run site:build`
# with output dir docs-site/dist.
#
# One-time setup: enable Pages with Source = "GitHub Actions" in
# Settings → Pages. Until then this workflow's deploy step will fail.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at workflow scope; the deploy job elevates to publish.
permissions:
  contents: read

# One in-flight deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site + workshop
        run: bun run site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Pages publishing + OIDC scoped to just this job (the build job doesn't need them).
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
