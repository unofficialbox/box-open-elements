name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify (typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify
