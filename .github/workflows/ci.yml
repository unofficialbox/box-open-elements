name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify (typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

  visual-regression:
    name: Visual regression (pixel diff, pinned container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # container-run.sh mounts the runner's Bun into the (Bun-less) Playwright
      # image, so provide it here rather than downloading it inside the image.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # Capture + strict pixel diff run inside the pinned Playwright container
      # (mcr.microsoft.com/playwright:v1.61.1-noble) via the same script used to
      # regenerate baselines locally — so Chromium/FreeType antialiasing matches
      # the committed baselines and a tight pixel gate is reliable. The browsers
      # are pre-baked in the image, so no separate browser install is needed.
      - name: Screenshot pixel-diff gate (pinned container)
        run: bash tools/preview/container-run.sh "bun run test:regression -- --pixel"

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: .regression-tmp/diff/
          if-no-files-found: ignore
