name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify (typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

  conformance:
    name: box-ui-elements conformance (geometry, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fails on real geometry drift or a moved/missing upstream anchor.
      # `intentional-divergence` claims (radii that deliberately track the live
      # Box web app) pass. Fetches pinned box-ui-elements SCSS from
      # raw.githubusercontent — retried once to absorb a transient network blip.
      - name: box-ui-elements geometry conformance (--strict)
        run: bun run bue-conformance --strict || (sleep 10 && bun run bue-conformance --strict --refresh)

      # Offline + deterministic (reads the committed live-Box reference snapshot).
      # Fails on a colour/geometry token that stops matching the real Box web app;
      # `accepted-divergence` (documented deliberate choices) passes.
      - name: Real Box web app conformance (--strict)
        run: bun run bue-conformance:webapp --strict

  visual-regression:
    name: Visual regression (pixel diff, pinned container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # container-run.sh mounts the runner's Bun into the (Bun-less) Playwright
      # image, so provide it here rather than downloading it inside the image.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      # Capture + strict pixel diff run inside the pinned Playwright container
      # (mcr.microsoft.com/playwright:v1.61.1-noble) via the same script used to
      # regenerate baselines locally — so Chromium/FreeType antialiasing matches
      # the committed baselines and a tight pixel gate is reliable. The browsers
      # are pre-baked in the image, so no separate browser install is needed.
      - name: Screenshot pixel-diff gate (pinned container)
        run: bash tools/preview/container-run.sh "bun run test:regression -- --pixel"

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: .regression-tmp/diff/
          if-no-files-found: ignore
