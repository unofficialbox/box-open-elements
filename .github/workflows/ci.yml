name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify (typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

  visual-regression:
    name: Visual regression (screenshots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright@1.61.1 install --with-deps chromium

      # Render-health gate: fails if a page errored, rendered blank, or changed
      # dimensions. Environment-independent (bundled fonts pin layout metrics).
      - name: Screenshot render-health gate
        run: bun run test:regression

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: .regression-tmp/diff/
          if-no-files-found: ignore
